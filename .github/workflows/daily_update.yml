name: daily_update

on:
  schedule:
    # Avoid minute 0 to reduce the chance of delayed/dropped scheduled runs
    # during GitHub Actions top-of-hour congestion.
    - cron: "7 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
      - name: Run pipeline
        run: |
          python -m io_career.main validate-sources
          python -m io_career.main run
      - name: Commit updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data site/data
          git diff --staged --quiet || git commit -m "chore: daily data update"
          git push
