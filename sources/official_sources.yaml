version: 1
sources:
- id: un_secretariat_careers
  org_name: United Nations Secretariat
  org_group: United Nations System
  source_url: https://careers.un.org/api/site/jobOpening/latestJobOpening
  source_type: official
  strategy: json_api
  options:
    data_path: data.result
    max_items: 200
    field_map:
      job_title: jobCodeTitle
      location: dutyStation.0.description
      deadline: endDate
      posted_date: insertedDate
      job_url: url
      summary: jobFamilyCode.Name
    job_url_template: https://careers.un.org/job-openings?job-id={jobId}
  fallback_urls:
  - https://careers.un.org/api/site/jobOpening/popularjobopening
- id: un_careers_portal
  org_name: UN Careers Portal
  org_group: United Nations System
