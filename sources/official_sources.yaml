      deadline: endDate
      posted_date: insertedDate
      job_url: url
      summary: jobFamilyCode.Name
    job_url_template: https://careers.un.org/job-openings?job-id={jobId}
  fallback_urls:
  - https://careers.un.org/api/site/jobOpening/latestJobOpening
- id: undp_jobs
  org_name: UNDP
  org_group: United Nations System
  source_url: https://estm.fa.em2.oraclecloud.com/hcmRestApi/resources/latest/recruitingCEJobRequisitions?onlyData=true&expand=requisitionList.workLocation,requisitionList.otherWorkLocations,requisitionList.secondaryLocations,flexFieldsFacet.values,requisitionList.requisitionFlexFields&finder=findReqs;siteNumber=CX_1,keyword=intern
  source_type: official
  strategy: oracle_ce_api
  options:
    title_keyword_any:
    - intern
    - internship
    - trainee
    - entry
    - associate
    - assistant
    deny_keyword_any:
    - consultancy
    - consultant
    job_url_template: https://estm.fa.em2.oraclecloud.com/fscmUI/faces/deeplink?objType=IRC_RECRUITING&action=ICE_JOB_DETAILS_RESP&objKey=pRequisitionNo={Id};pCalledFrom=FUSESHELL
    max_items: 120
  fallback_urls:
  - https://estm.fa.em2.oraclecloud.com/hcmRestApi/resources/latest/recruitingCEJobRequisitions?onlyData=true&expand=requisitionList.workLocation,requisitionList.otherWorkLocations,requisitionList.secondaryLocations,flexFieldsFacet.values,requisitionList.requisitionFlexFields&finder=findReqs;siteNumber=CX_1,keyword=trainee
  fail_silently: true
